<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html">
<f:view>
    <h:head>
        <title>ChatHomepage - #{sessionBean.loggedInUser.username}</title>
        <h:outputStylesheet library="css" name="main.css"/>
    </h:head>
    <h:body>
        <script>
            const socket = new WebSocket("ws://anwars-dator:8080/websocketserver/ws/chat");

            socket.onmessage = (event) => {
                let div = document.getElementById("messages");
                const p = document.createElement("p");
                p.textContent = event.data;
                div.appendChild(p);
            }

            function sendMessage() {
                const msg = document.getElementById("msg").value;
                socket.send(msg);
            }
        </script>

        <div class="page-wrapper">
            <div class="card">
                <div id="log"></div>
                <div class="field chat-input-row">
                    <h:inputText id="msg" styleClass="chat-input"/>
                    <button onclick="sendMessage()" class="btn-submit">Send</button>
                </div>
            </div>

            <h:form>
                <h:commandButton value="Logout"
                                 action="#{sessionBean.logout}"
                                 styleClass="btn-logout"/>
            </h:form>
        </div>
    </h:body>
</f:view>
</html>
