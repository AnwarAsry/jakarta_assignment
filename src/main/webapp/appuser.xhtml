<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html">
<f:view>
    <h:head>
        <title>ChatHomepage - #{sessionBean.loggedInUser.username}</title>
        <h:outputStylesheet library="css" name="main.css"/>
    </h:head>
    <h:body>
        <h:outputText value="#{sessionBean.loggedInUser.username}"/>

        <div id="messages"></div>
        <h:inputText id="msg"/>
        <button onclick="send()">Send Message</button>

        <h:commandButton value="Log out" action="#{sessionBean.logout()}"/>

        <script>
            const username = "Anwar";
            const socket = new WebSocket("ws://anwars-dator:8080/websocketserver/ws/chat");

            socket.onmessage = (event) => {
                let div = document.getElementById("messages");
                const p = document.createElement("p");
                p.textContent = event.data;
                div.appendChild(p);
            }

            socket.onopen = () => {
                console.log("Ansluten")
            }

            const send = () => {
                let text = document.getElementById("msg").textContent;
                socket.send(username + ": " + text);
                document.getElementById("msg").value = "";
            }
        </script>
    </h:body>
</f:view>
</html>
