<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html">
<f:view>
    <h:head>
        <title>ChatHomepage - Login</title>
        <h:outputStylesheet library="css" name="main.css"/>
    </h:head>
    <h:body>
        <div class="page-wrapper">

            <div class="card">
                <h3 class="card-label">Login</h3>
                <h:form>
                    <div class="field">
                        <h:outputLabel for="username" value="Username"/>
                        <h:inputText id="username" value="#{loginBean.username}" required="true"/>
                    </div>
                    <div class="field">
                        <h:outputLabel for="password" value="Password"/>
                        <h:inputSecret id="password" value="#{loginBean.password}" required="true"/>
                    </div>
                    <h:messages styleClass="error-message"/>

                    <h:panelGroup rendered="#{not empty loginBean.errorMessage}">
                        <p class="error-message">#{loginBean.errorMessage}</p>
                    </h:panelGroup>
                    <h:commandButton value="Login" action="#{loginBean.login()}" styleClass="btn-submit"/>
                </h:form>
            </div>
        </div>
    </h:body>
</f:view>
</html>
