<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html">
<f:view>
    <h:head>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: linear-gradient(0.25turn, #65AFFF, #41D3BD);
            }

            h2 {
                padding-bottom: 6px;
                border-bottom: 2px solid #333;
            }

            .form-group {
                margin-bottom: 12px;
            }

            label {
                margin-bottom: 4px;
                display: block;
                font-weight: bold;
            }

            input {
                width: 100%;
                padding: 8px;
            }

            .btn {
                cursor: pointer;
                margin-top: 10px;
                padding: 10px 24px;
                border: none;
                color: white;
                background: #333;
            }

            table {
                width: 100%;
                margin-top: 20px;
                border-collapse: collapse;
            }

            th, td {
                padding: 10px;
                border: 1px solid #ccc;
                text-align: left;
            }

            th {
                color: white;
                background: #333;
            }

            tr:nth-child(even) {
                background: #eee;
            }
        </style>
    </h:head>
    <h:body>
        <h2>Add New User</h2>
        <h:form>
            <div class="form-group">
                <h:outputLabel for="username" value="Username:"/>
                <h:inputText id="username" value="#{appUserBean.username}" required="true"/>
            </div>
            <div class="form-group">
                <h:outputLabel for="password" value="Password:"/>
                <h:inputSecret id="password" value="#{appUserBean.password}" required="true"/>
            </div>
            <h:commandButton styleClass="btn" value="Save User" action="#{appUserBean.saveUser()}"/>
        </h:form>

        <h2>All Users</h2>
        <h:dataTable value="#{appUserBean.getUsers()}" var="user">
            <h:column>
                <f:facet name="header">ID</f:facet>
                #{user.id}
            </h:column>
            <h:column>
                <f:facet name="header">Username</f:facet>
                #{user.username}
            </h:column>
        </h:dataTable>
    </h:body>
</f:view>
</html>
