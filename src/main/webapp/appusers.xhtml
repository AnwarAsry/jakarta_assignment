<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html">
<f:view>
    <h:head></h:head>
    <h:body>
        <h2>Add New User</h2>
        <h:form>
            <div class="form-group">
                <h:outputLabel for="username" value="Username:"/>
                <h:inputText id="username" value="#{appUserBean.username}" required="true"/>
            </div>
            <div class="form-group">
                <h:outputLabel for="password" value="Password:"/>
                <h:inputSecret id="password" value="#{appUserBean.password}" required="true"/>
            </div>
            <h:commandButton value="Save User" action="#{appUserBean.saveUser()}"/>
        </h:form>

        <h2>All Users</h2>
        <h:dataTable value="#{appUserBean.getUsers()}" var="user">
            <h:column>
                <f:facet name="header">ID</f:facet>
                #{user.id}
            </h:column>
            <h:column>
                <f:facet name="header">Username</f:facet>
                #{user.username}
            </h:column>
        </h:dataTable>
    </h:body>
</f:view>
</html>
